services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: project1-timescaledb
    environment:
      POSTGRES_DB: predictive_maintenance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d predictive_maintenance"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: project1-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/2181; echo srvr >&3; grep -q Mode <&3' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: project1-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: project1-kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./deploy/create-topics.sh:/opt/project/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/opt/project/create-topics.sh"]
    restart: "no"

  airflow-postgres:
    image: postgres:16
    container_name: project1-airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    container_name: project1-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/dags
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: "50000"
      PYTHONPATH: /opt/project
      PGHOST: timescaledb
      PGPORT: "5432"
      PGDATABASE: predictive_maintenance
      PGUSER: postgres
      PGPASSWORD: postgres
      BATCH_SENSOR_CSV_PATH: /opt/project/Data/batch/sensor_batch.csv
      BATCH_PIPELINE_STAGING_DIR: /opt/project/Data/batch/staging
    user: "50000:0"
    working_dir: /opt/project
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Logic
      --lastname Veda
      --role Admin
      --email admin@example.com
      --password admin || true
      "
    restart: "no"

  airflow-webserver:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    container_name: project1-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    user: "50000:0"
    working_dir: /opt/project
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs
    ports:
      - "127.0.0.1:8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: deploy/airflow/Dockerfile
    container_name: project1-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    user: "50000:0"
    working_dir: /opt/project
    volumes:
      - .:/opt/project
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  timescaledb_data:
  airflow_postgres_data:
  airflow_logs:
